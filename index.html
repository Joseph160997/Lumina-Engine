<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lumina-engine</title>
  </head>
 <body class="bg-linear-to-br from-slate-950 via-slate-900 to-indigo-950 text-white min-h-screen font-sans">
  <div id="app" class="container mx-auto px-4 py-12">
    
    <header class="mb-16 text-center"> 
      <h1 class="text-5xl md:text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-linear-to-r from-indigo-400 to-cyan-400 mb-4">
        LUMINA ENGINE
      </h1>
      <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide italic">
        Tu base de datos de cine personal
      </p>
    </header>

    <section class="max-w-2xl mx-auto mb-16">
      <form id="search-form" class="flex flex-col sm:flex-row gap-4 items-center">
        
        <div class="relative w-full group">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl pointer-events-none group-focus-within:scale-110 transition-transform duration-300">
            🔎
          </span>
          <input 
            type="text" 
            id="search-input" 
            placeholder="Busca una película..." 
            class="w-full p-4 pl-12 rounded-2xl bg-white border border-slate-700 backdrop-blur-sm text-lg placeholder:text-slate-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-2xl hover:bg-white/10"
          />
        </div>

        <button 
          type="submit" 
          class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-500/20 active:scale-95 transition-all whitespace-nowrap"
        >
          Buscar
        </button>
      </form>
    </section>

    <main id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
